spring:
  datasource:
    # MySQL 호환 모드
    url: jdbc:h2:mem:quiket-test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  data:
    redis:
      # 컨텍스트 테스트용 Redis 비활성화
      repositories:
        enabled: false

  jpa:
    hibernate:
      # 테스트용 스키마 자동 생성/정리
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        use_sql_comments: false
