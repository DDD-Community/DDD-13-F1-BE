spring:
  application:
    name: quiket
  profiles:
    active: local  # 기본 실행 프로파일 - 서버 배포 시 환경변수로 override

  # JPA 공통
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none          # 각 프로파일에서 override
    properties:
      hibernate:
        format_sql: false     # SQL 로그 포맷팅 여부

  # 파일 업로드
  servlet:
    multipart:
      enabled: true
      max-file-size: 20MB     # 단일 파일 최대 크기
      max-request-size: 20MB  # 요청 전체 최대 크기

# Swagger (SpringDoc OpenAPI)
springdoc:
  api-docs:
    path: /api-docs

  swagger-ui:
    path: /swagger-ui
    operations-sorter: method       # HTTP 메서드 기준 정렬 (GET → POST → PUT → DELETE 순)
    tags-sorter: alpha              # 태그(컨트롤러 그룹) 정렬 방식
    try-it-out-enabled: true        # Swagger UI에서 직접 API 호출 가능 여부
    display-request-duration: true  # API 호출 시 응답 시간 표시 여부