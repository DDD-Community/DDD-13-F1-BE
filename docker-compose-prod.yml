services:
  quiket-server:
    image: ${GHCR_IMAGE}
    container_name: quiket-server
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env
    volumes:
      # 로그 영속화 - 컨테이너 내부 로그 디렉토리 호스트 bind mount
      # 재배포 후에도 호스트 ./logs 에서 이전 로그 조회 가능
      # logback prod LOG_DIR(/var/log/quicket)과 동일 경로
      - ./logs:/var/log/quicket
