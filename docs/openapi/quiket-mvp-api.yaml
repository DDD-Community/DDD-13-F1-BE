openapi: 3.0.3
info:
  title: Quiket MVP API
  version: 1.0.1
  description: |
    Quiket MVP API 명세

    기준 문서:
    - 기존 Quiket Auth API 명세
    - Quiket 기능명세 목록 v1.0
    - Quiket 기능명세 상세 v1.0
    - Quiket 서비스 DDL

    MVP 범위:
    - 자체 회원가입, 이메일 인증, 자체 로그인
    - JWT Access Token / Refresh Token 재발급, 로그아웃
    - 비밀번호 재설정
    - Kakao OAuth 로그인 및 기존 계정 연동
    - 홈 메인 데이터, 최근활동
    - 과목 추가/조회/수정/삭제, 시험 D-Day 설정
    - 챕터명 수정
    - PDF/이미지/텍스트 강의 업로드
    - 파트 자동/직접 분류, 파트 조회/편집/추가
    - 퀴즈 생성, 생성 상태 조회, 퀴즈 세트 조회
    - 퀴즈 결과 제출, 결과/해설 조회, 다시 풀기
    - 도토리/XP/캐릭터 성장 조회
    - 마이페이지 계정(닉네임/이메일 변경, 비밀번호 변경, 회원 탈퇴), 알림, 피드백

    MVP 제외:
    - 퀴즈기록 별도 메뉴
    - 오답노트 별도 메뉴
    - PPTX/DOCX 업로드
    - 텍스트 검수 화면
    - 파트 병합/분리/순서변경/삭제
    - 플래시카드, 쪽지시험
    - 아이템 스토어
    - 요점정리

    공통 응답 형식:
    - 성공/실패 응답은 모두 ApiResponse 형태를 사용합니다.
    - success 필드는 성공/실패 여부만 표현합니다.
    - 외부 노출 식별자는 UUID v7 문자열(public_id)을 사용합니다.

    [Redis 사용 정책]
    - 이메일 인증 코드, 비밀번호 재설정 코드, Kakao signupToken, Kakao linkToken은 Redis TTL 10분 기반 임시 데이터로 관리합니다.
    - 이메일 인증 코드와 비밀번호 재설정 코드는 재발송 시 이전 pending 코드를 즉시 무효화합니다.
    - Refresh Token은 DB에 해시값으로 영속 저장합니다.
    - Redis 임시 데이터는 만료 후 재사용하지 않습니다.
servers:
  - url: http://43.201.222.243:8080/api/v1
    description: Quiket 운영/개발 서버
  - url: http://localhost:8080/api/v1
    description: Local server

tags:
  - name: Auth
    description: 회원가입, 로그인, 토큰, 로그아웃
  - name: Email Verification
    description: 이메일 인증
  - name: Password Reset
    description: 비밀번호 재설정
  - name: OAuth
    description: 소셜 로그인 및 계정 연동
  - name: Me
    description: 내 인증 정보 조회
  - name: Home
    description: 홈 메인, 최근활동
  - name: Subjects
    description: 과목 추가, 조회, 수정, 삭제
  - name: Certificates
    description: 자격증 사전 목록
  - name: Chapters
    description: 챕터 조회 및 수정
  - name: Lecture Uploads
    description: PDF, 이미지, 텍스트 강의 업로드
  - name: Parts
    description: 파트 조회, 편집, 추가
  - name: Quiz Generation
    description: 퀴즈 생성 및 생성 상태 조회
  - name: Quiz Play
    description: 퀴즈 세트 조회 및 풀이 시작
  - name: Results
    description: 결과 제출, 결과 조회, 해설 조회
  - name: History
    description: MVP 최근활동 기반 퀴즈 기록 조회
  - name: Gamification
    description: 도토리, XP, 큐링 성장
  - name: My Page
    description: 계정 설정, 알림 설정, 피드백

paths:
  /auth/signup:
    post:
      tags:
        - Auth
      summary: 자체 회원가입
      description: |
        이메일, 비밀번호, 닉네임으로 자체 계정을 생성합니다.
        회원가입 성공 시 이메일 인증 요청이 함께 생성됩니다.
        이메일 인증 완료 전까지 로그인할 수 없습니다.
        기능명세 상세 기준 자동 로그인은 이메일 인증 확인 API에서 Access Token / Refresh Token을 발급하는 방식으로 처리합니다.
      operationId: signup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignupRequest'
            examples:
              default:
                value:
                  email: user@example.com
                  password: Password123!
                  passwordConfirm: Password123!
                  nickname: 도토리장인
      responses:
        '201':
          description: 회원가입 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SignupResponse'
              examples:
                default:
                  value:
                    success: true
                    code: AUTH_SIGNUP_SUCCESS
                    message: 회원가입이 완료되었습니다. 이메일 인증을 진행해주세요.
                    data:
                      userId: 018f8c2e-5f73-7b6a-b9f0-3f55e7f7c901
                      email: user@example.com
                      nickname: 도토리장인
                      emailVerificationRequired: true
                      emailVerificationSent: true
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          description: 이메일 중복
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                duplicatedEmail:
                  value:
                    success: false
                    code: AUTH_EMAIL_ALREADY_EXISTS
                    message: 이미 사용 중인 이메일입니다.
                    data: null

  /auth/emails/availability:
    get:
      tags:
        - Auth
      summary: 이메일 중복 확인
      description: 회원가입에 사용할 이메일의 사용 가능 여부를 조회합니다.
      operationId: checkEmailAvailability
      parameters:
        - name: email
          in: query
          required: true
          description: 중복 확인 대상 이메일
          schema:
            type: string
            format: email
            example: user@example.com
      responses:
        '200':
          description: 이메일 사용 가능 여부 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmailAvailabilityResponse'
              examples:
                available:
                  value:
                    success: true
                    code: AUTH_EMAIL_AVAILABLE
                    message: 사용 가능한 이메일입니다.
                    data:
                      email: user@example.com
                      available: true
                unavailable:
                  value:
                    success: true
                    code: AUTH_EMAIL_UNAVAILABLE
                    message: 이미 사용 중인 이메일입니다.
                    data:
                      email: user@example.com
                      available: false
        '400':
          $ref: '#/components/responses/BadRequest'

  /auth/email-verifications:
    post:
      tags:
        - Email Verification
      summary: 이메일 인증 메일 재발송
      description: |
        회원가입 후 이메일 인증 메일을 재발송합니다.
        인증 방식은 코드 입력 방식을 기본으로 하되, 링크 방식 확장을 고려합니다.
        인증 코드는 Redis에 TTL 10분으로 저장합니다.
        재발송 시 이전 pending 인증 코드는 즉시 무효화되며, 최신 코드만 검증할 수 있습니다.
      operationId: resendEmailVerification
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailVerificationRequest'
            examples:
              default:
                value:
                  email: user@example.com
      responses:
        '200':
          description: 이메일 인증 메일 발송 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmailVerificationSentResponse'
              examples:
                default:
                  value:
                    success: true
                    code: AUTH_EMAIL_VERIFICATION_SENT
                    message: 이메일 인증 메일이 발송되었습니다.
                    data:
                      email: user@example.com
                      expiresInSeconds: 600
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          description: 가입되지 않은 이메일
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/email-verifications/confirm:
    post:
      tags:
        - Email Verification
      summary: 이메일 인증 확인
      description: |
        이메일로 발송된 인증 코드를 검증하고 계정을 활성화합니다.
        기능명세 상세의 "가입 성공 시 자동 로그인 → 홈 이동" 정책에 맞춰 인증 성공 시 Quiket Access Token / Refresh Token을 함께 발급합니다.
        verificationCode 또는 verificationToken은 Redis TTL 10분 기반 임시 값으로 검증하며, 성공/만료 후 재사용할 수 없습니다.
      operationId: confirmEmailVerification
      parameters:
        - $ref: '#/components/parameters/XDeviceId'
        - $ref: '#/components/parameters/XDeviceName'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailVerificationConfirmRequest'
            examples:
              code:
                value:
                  email: user@example.com
                  verificationCode: '123456'
              token:
                value:
                  email: user@example.com
                  verificationToken: eyJraWQiOiJlbWFpbC12ZXJpZmljYXRpb24ifQ
      responses:
        '200':
          description: 이메일 인증 성공 및 자동 로그인 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokenResponse'
              examples:
                default:
                  value:
                    success: true
                    code: AUTH_EMAIL_VERIFIED_AND_LOGIN
                    message: 이메일 인증이 완료되었습니다.
                    data:
                      accessToken: eyJhbGciOiJIUzI1NiJ9.access.payload
                      refreshToken: eyJhbGciOiJIUzI1NiJ9.refresh.payload
                      tokenType: Bearer
                      accessTokenExpiresIn: 1800
                      refreshTokenExpiresIn: 2592000
                      user:
                        id: 018f8c2e-5f73-7b6a-b9f0-3f55e7f7c901
                        email: user@example.com
                        nickname: 도토리장인
                        dotoriBalance: 0
                        emailVerified: true
                        status: active
                        providers:
                          - local
        '400':
          description: 인증 코드/토큰 오류 또는 만료
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/login:
    post:
      tags:
        - Auth
      summary: 자체 로그인
      description: |
        이메일과 비밀번호로 로그인합니다.
        이메일 인증이 완료되지 않은 계정은 로그인할 수 없습니다.
        비밀번호 입력 실패 횟수를 누적하고, 5회 실패 시 계정이 잠금 처리되며 비밀번호 재설정/잠금 해제 플로우로 전환해야 합니다.
        5회 실패로 계정이 잠기면 비밀번호 재설정 인증코드를 함께 발송합니다.
      operationId: login
      parameters:
        - $ref: '#/components/parameters/XDeviceId'
        - $ref: '#/components/parameters/XDeviceName'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            examples:
              default:
                value:
                  email: user@example.com
                  password: Password123!
      responses:
        '200':
          description: 로그인 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokenResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          description: 로그인 실패
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalidCredentials:
                  value:
                    success: false
                    code: AUTH_INVALID_CREDENTIALS
                    message: 이메일 또는 비밀번호가 올바르지 않습니다.
                    data:
                      email: user@example.com
                      failedLoginCount: 2
                      remainingAttempts: 3
                      passwordResetRequired: false
        '403':
          description: 이메일 미인증 또는 계정 잠금
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                emailNotVerified:
                  value:
                    success: false
                    code: AUTH_EMAIL_NOT_VERIFIED
                    message: 이메일 인증이 필요합니다.
                    data: null
                accountLocked:
                  value:
                    success: false
                    code: AUTH_ACCOUNT_LOCKED
                    message: 계정이 잠금 처리되었습니다. 비밀번호 재설정을 진행해주세요.
                    data:
                      email: user@example.com
                      failedLoginCount: 5
                      remainingAttempts: 0
                      passwordResetRequired: true
                      nextAction: password_reset
                      resetCodeSent: true

  /auth/token/refresh:
    post:
      tags:
        - Auth
      summary: 토큰 재발급
      description: Refresh Token을 검증하여 새로운 Access Token과 Refresh Token을 발급합니다.
      operationId: refreshToken
      parameters:
        - $ref: '#/components/parameters/XDeviceId'
        - $ref: '#/components/parameters/XDeviceName'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          description: 토큰 재발급 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokenResponse'
        '401':
          description: Refresh Token 무효
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/logout:
    post:
      tags:
        - Auth
      summary: 로그아웃
      description: 현재 사용 중인 Refresh Token을 폐기합니다.
      operationId: logout
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
      responses:
        '200':
          description: 로그아웃 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmptySuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/password-reset/requests:
    post:
      tags:
        - Password Reset
      summary: 비밀번호 재설정 요청
      description: |
        등록된 이메일로 비밀번호 재설정 링크 또는 인증 코드를 발송합니다.
        재설정 링크/코드 유효시간은 10분입니다.
        재설정 코드 또는 재설정 토큰은 Redis에 TTL 10분으로 저장합니다.
        재요청 시 이전 pending 재설정 코드/토큰은 즉시 무효화됩니다.
        5회 이상 로그인 실패로 잠긴 계정의 잠금 해제도 동일 플로우를 사용합니다.
      operationId: requestPasswordReset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetRequest'
      responses:
        '200':
          description: 비밀번호 재설정 요청 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasswordResetRequestedResponse'
              examples:
                default:
                  value:
                    success: true
                    code: AUTH_PASSWORD_RESET_REQUESTED
                    message: 비밀번호 재설정 안내가 발송되었습니다.
                    data:
                      email: user@example.com
                      expiresInSeconds: 600
        '404':
          description: 가입되지 않은 이메일
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                userNotFound:
                  value:
                    success: false
                    code: AUTH_USER_NOT_FOUND
                    message: 가입되지 않은 이메일입니다.
                    data: null
        '409':
          description: 소셜 전용 계정
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                socialOnlyAccount:
                  value:
                    success: false
                    code: AUTH_LOCAL_IDENTITY_NOT_FOUND
                    message: 자체 로그인 인증 수단이 없는 계정입니다.
                    data: null

  /auth/password-reset/confirm:
    post:
      tags:
        - Password Reset
      summary: 비밀번호 재설정 완료
      description: |
        재설정 토큰 또는 인증 코드를 검증하고 새 비밀번호로 변경합니다.
        verificationCode 또는 resetToken은 Redis TTL 10분 기반 임시 값으로 검증합니다.
        새 비밀번호는 가입 시 비밀번호 정책과 동일하며, 직전 비밀번호와 동일한 값으로 변경할 수 없습니다.
        비밀번호 재설정 완료 시 잠긴 계정은 active 상태로 복구하고, 기존 Refresh Token을 모두 폐기하여 다른 기기를 로그아웃합니다.
      operationId: confirmPasswordReset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetConfirmRequest'
      responses:
        '200':
          description: 비밀번호 재설정 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmptySuccessResponse'
              examples:
                passwordReset:
                  value:
                    success: true
                    code: AUTH_PASSWORD_RESET_COMPLETED
                    message: 비밀번호 재설정이 완료되었습니다.
                    data: null
                lockedAccountUnlocked:
                  value:
                    success: true
                    code: AUTH_PASSWORD_RESET_COMPLETED
                    message: 비밀번호 재설정이 완료되었습니다. 계정 잠금이 해제되었습니다.
                    data: null
        '400':
          description: 토큰/코드 오류 또는 비밀번호 정책 위반
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalidCode:
                  value:
                    success: false
                    code: AUTH_PASSWORD_RESET_INVALID
                    message: 인증 코드 또는 토큰이 올바르지 않습니다.
                    data: null
                expiredCode:
                  value:
                    success: false
                    code: AUTH_PASSWORD_RESET_EXPIRED
                    message: 비밀번호 재설정 요청이 만료되었습니다.
                    data: null
                sameAsPreviousPassword:
                  value:
                    success: false
                    code: AUTH_PASSWORD_SAME_AS_PREVIOUS
                    message: 이전 비밀번호와 동일한 비밀번호는 사용할 수 없습니다.
                    data: null

  /auth/oauth/kakao/login:
    post:
      tags:
        - OAuth
      summary: Kakao OAuth 로그인
      description: |
        Android 앱에서 Kakao Android SDK 로그인으로 획득한 kakaoAccessToken을 서버로 전달합니다.
        계정 연동 또는 닉네임 설정이 필요한 경우 linkToken/signupToken을 Redis에 TTL 10분으로 저장합니다.
        기존 Kakao 사용자 로그인과 기존 계정 연동 필요 응답에는 agreedToTerms가 필요하지 않습니다.
        Kakao 정보만으로 신규 사용자를 즉시 생성하는 경우에는 agreedToTerms=true가 필요합니다.

        서버 처리 흐름:
        1. kakaoAccessToken으로 Kakao 사용자 정보 조회
        2. Kakao 회원번호를 provider_subject로 사용
        3. 기존 kakao 인증 수단 존재 시 로그인 처리
        4. 없으면 email 기준 기존 사용자 확인
        5. 기존 사용자 없으면 신규 사용자와 kakao 인증 수단 생성
        6. 기존 사용자 존재하지만 kakao 인증 수단이 없으면 계정 연동 필요 응답 반환
        7. 로그인 성공 시 Quiket Access Token / Refresh Token 발급

        서버는 Kakao 사용자 정보 조회 시 다음 요청을 수행합니다.
        GET https://kapi.kakao.com/v2/user/me
        Authorization: Bearer {kakaoAccessToken}
      operationId: kakaoLogin
      parameters:
        - $ref: '#/components/parameters/XDeviceId'
        - $ref: '#/components/parameters/XDeviceName'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/KakaoLoginRequest'
            examples:
              default:
                value:
                  kakaoAccessToken: kakao_access_token_from_android_sdk
                  agreedToTerms: true
      responses:
        '200':
          description: Kakao 로그인 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokenResponse'
        '201':
          description: Kakao 신규 가입 후 로그인 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokenResponse'
        '202':
          description: 최초 로그인 후 닉네임 설정 필요
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KakaoNicknameRequiredResponse'
        '400':
          description: Kakao 이메일 제공 동의 누락 또는 신규 가입 약관 동의 누락
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                emailRequired:
                  value:
                    success: false
                    code: AUTH_OAUTH_EMAIL_REQUIRED
                    message: Kakao 계정의 유효한 이메일 제공 동의가 필요합니다.
                    data: null
                termsRequired:
                  value:
                    success: false
                    code: COMMON_VALIDATION_ERROR
                    message: 신규 가입을 위해 약관 동의가 필요합니다.
                    data: null
        '409':
          description: 기존 이메일 계정과 연동 필요
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KakaoAccountLinkRequiredResponse'
        '401':
          description: Kakao Access Token 무효
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/oauth/kakao/link:
    post:
      tags:
        - OAuth
      summary: Kakao 기존 계정 연동
      description: |
        동일 이메일로 기존 Local 계정이 있는 경우, 사용자의 동의를 받은 뒤 Kakao 인증 수단을 기존 사용자에 연결합니다.
        로그인 화면에서 진행되는 연동이므로 기존 Local 계정 비밀번호를 함께 검증합니다.
        linkToken은 Redis에 저장된 Kakao 연동 임시 토큰을 검증합니다.
      operationId: linkKakaoAccount
      parameters:
        - $ref: '#/components/parameters/XDeviceId'
        - $ref: '#/components/parameters/XDeviceName'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/KakaoAccountLinkRequest'
      responses:
        '200':
          description: Kakao 계정 연동 후 로그인 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokenResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          description: 비밀번호 오류 또는 연동 토큰 무효
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/oauth/kakao/nickname:
    post:
      tags:
