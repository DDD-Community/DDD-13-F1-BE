        '401':
          $ref: '#/components/responses/Unauthorized'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    XDeviceId:
      name: X-Device-Id
      in: header
      required: false
      description: 클라이언트 디바이스 식별자
      schema:
        type: string
        maxLength: 128
        example: android-device-uuid
    XDeviceName:
      name: X-Device-Name
      in: header
      required: false
      description: 사용자에게 표시할 디바이스 이름
      schema:
        type: string
        maxLength: 100
        example: Galaxy S24
    Page:
      name: page
      in: query
      required: false
      description: 0부터 시작하는 페이지 번호
      schema:
        type: integer
        minimum: 0
        default: 0
    Size:
      name: size
      in: query
      required: false
      description: 페이지 크기
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 10
    SubjectId:
      name: subjectId
      in: path
      required: true
      description: 과목 publicId
      schema:
        type: string
        format: uuid
        example: 018f8c2e-5f73-7b6a-b9f0-3f55e7f7c901
    ChapterId:
      name: chapterId
      in: path
      required: true
      description: 챕터 publicId
      schema:
        type: string
        format: uuid
        example: 018f8c2e-6a10-7ca2-8a4b-52f3b4b7a100
    PartId:
      name: partId
      in: path
      required: true
      description: 파트 publicId
      schema:
        type: string
        format: uuid
        example: 018f8c2e-7001-7d4e-9404-4440c3f4ad21
    LectureUploadId:
      name: lectureUploadId
      in: path
      required: true
      description: 강의 업로드 publicId
      schema:
        type: string
        format: uuid
        example: 018f8c2e-7123-7af4-9b72-b1d93c401f41
    QuizSessionId:
      name: quizSessionId
      in: path
      required: true
      description: 퀴즈 세션 publicId
      schema:
        type: string
        format: uuid
        example: 018f8c2e-8123-72ab-96a1-f7c49c1d1111
    ResultId:
      name: resultId
      in: path
      required: true
      description: 퀴즈 결과 publicId
      schema:
        type: string
        format: uuid
        example: 018f8c2e-9999-7b11-b2d1-774f4c1c2222
    PlaySessionId:
      name: playSessionId
      in: path
      required: true
      description: 풀이 세션 ID. 서버 publicId 또는 클라이언트 발급 clientSessionId
      schema:
        type: string
        maxLength: 128
        example: android-play-session-uuid

  responses:
    BadRequest:
      description: 잘못된 요청
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: 인증 실패
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: 접근 권한 없음
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: 리소스 없음
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    SignupRequest:
      type: object
      required:
        - email
        - password
        - passwordConfirm
        - nickname
      properties:
        email:
          type: string
          format: email
          maxLength: 255
          example: user@example.com
        password:
          type: string
          minLength: 8
          maxLength: 32
          pattern: '^(?=.*[A-Za-z])(?=.*\d)[A-Za-z0-9~!@#$%^&*()_+=\[\]{}.,?-]{8,32}$'
          example: Password123!
        passwordConfirm:
          type: string
          minLength: 8
          maxLength: 32
          example: Password123!
        nickname:
          type: string
          minLength: 2
          maxLength: 12
          pattern: '^[가-힣A-Za-z]{2,12}$'
          example: 도토리장인

    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          maxLength: 255
          example: user@example.com
        password:
          type: string
          minLength: 8
          maxLength: 32
          example: Password123!

    RefreshTokenRequest:
      type: object
      required:
        - refreshToken
      properties:
        refreshToken:
          type: string
          example: eyJhbGciOiJIUzI1NiJ9.refresh.payload

    LogoutRequest:
      type: object
      properties:
        refreshToken:
          type: string
          example: eyJhbGciOiJIUzI1NiJ9.refresh.payload

    EmailVerificationRequest:
      type: object
      required:
        - email
      properties:
        email:
          type: string
          format: email
          example: user@example.com

    EmailVerificationConfirmRequest:
      type: object
      required:
        - email
      properties:
        email:
          type: string
          format: email
          example: user@example.com
        verificationCode:
          type: string
          minLength: 6
          maxLength: 6
          pattern: '^\d{6}$'
          description: 이메일로 발송된 6자리 숫자 인증 코드 (기능명세 AUTH-001)
          example: '123456'
        verificationToken:
          type: string
          maxLength: 255
          example: eyJraWQiOiJlbWFpbC12ZXJpZmljYXRpb24ifQ
      oneOf:
        - required:
            - verificationCode
        - required:
            - verificationToken

    PasswordResetRequest:
      type: object
      required:
        - email
      properties:
        email:
          type: string
          format: email
          example: user@example.com

    PasswordResetConfirmRequest:
      type: object
      required:
        - email
        - newPassword
        - newPasswordConfirm
      properties:
        email:
          type: string
          format: email
          example: user@example.com
        resetToken:
          type: string
          maxLength: 255
          example: eyJraWQiOiJwYXNzd29yZC1yZXNldCJ9
        verificationCode:
          type: string
          minLength: 6
          maxLength: 6
          pattern: '^\d{6}$'
          description: 비밀번호 재설정용 6자리 숫자 인증 코드 (기능명세 AUTH-004)
          example: '123456'
        newPassword:
          type: string
          minLength: 8
          maxLength: 32
          pattern: '^(?=.*[A-Za-z])(?=.*\d)[A-Za-z0-9~!@#$%^&*()_+=\[\]{}.,?-]{8,32}$'
          example: NewPassword123!
        newPasswordConfirm:
          type: string
          minLength: 8
          maxLength: 32
          example: NewPassword123!
      oneOf:
        - required:
            - resetToken
        - required:
            - verificationCode

    KakaoLoginRequest:
      type: object
      required:
        - kakaoAccessToken
      properties:
        kakaoAccessToken:
          type: string
          description: Android Kakao SDK에서 획득한 Kakao Access Token
          example: kakao_access_token_from_android_sdk
        agreedToTerms:
          type: boolean
          description: 신규 Kakao 가입 생성 시 true 명시 필요
          example: true

    KakaoAccountLinkRequest:
      type: object
      required:
        - linkToken
        - email
        - password
        - agreedToLink
      properties:
        linkToken:
          type: string
          example: eyJraWQiOiJrYWthby1saW5rIn0
        email:
          type: string
          format: email
          example: user@example.com
        password:
          type: string
          example: Password123!
        agreedToLink:
          type: boolean
          example: true

    KakaoNicknameRequest:
      type: object
      required:
        - signupToken
        - nickname
      properties:
        signupToken:
          type: string
          example: eyJraWQiOiJrYWthby1zaWdudXAifQ
        nickname:
          type: string
          minLength: 2
          maxLength: 12
          pattern: '^[가-힣A-Za-z]{2,12}$'
          example: 도토리장인

    AuthUser:
      type: object
      required:
        - id
        - email
        - nickname
        - dotoriBalance
        - emailVerified
        - status
        - providers
      properties:
        id:
          type: string
          format: uuid
          example: 018f8c2e-5f73-7b6a-b9f0-3f55e7f7c901
        email:
          type: string
          format: email
          example: user@example.com
        nickname:
          type: string
          example: 도토리장인
        dotoriBalance:
          type: integer
          minimum: 0
          example: 0
        emailVerified:
          type: boolean
          example: true
        status:
          $ref: '#/components/schemas/UserStatus'
        providers:
          type: array
          items:
            $ref: '#/components/schemas/AuthProvider'
          example:
            - local
            - kakao

    TokenPair:
      type: object
      required:
        - accessToken
        - refreshToken
        - tokenType
        - accessTokenExpiresIn
        - refreshTokenExpiresIn
      properties:
        accessToken:
          type: string
          example: eyJhbGciOiJIUzI1NiJ9.access.payload
        refreshToken:
          type: string
          example: eyJhbGciOiJIUzI1NiJ9.refresh.payload
        tokenType:
          type: string
          example: Bearer
        accessTokenExpiresIn:
          type: integer
          format: int64
          description: Access Token 만료 시간(초). MVP 기준 30분
          example: 1800
        refreshTokenExpiresIn:
          type: integer
          format: int64
          description: Refresh Token 만료 시간(초). MVP 기준 30일
          example: 2592000

    AuthTokenData:
      allOf:
        - $ref: '#/components/schemas/TokenPair'
        - type: object
          required:
            - user
          properties:
            user:
              $ref: '#/components/schemas/AuthUser'

    SignupData:
      type: object
      required:
        - userId
        - email
        - nickname
        - emailVerificationRequired
        - emailVerificationSent
      properties:
        userId:
          type: string
          format: uuid
          example: 018f8c2e-5f73-7b6a-b9f0-3f55e7f7c901
        email:
          type: string
          format: email
          example: user@example.com
        nickname:
          type: string
          example: 도토리장인
        emailVerificationRequired:
          type: boolean
          example: true
        emailVerificationSent:
          type: boolean
          example: true

    EmailAvailabilityData:
      type: object
      required:
        - email
        - available
      properties:
        email:
          type: string
          format: email
          example: user@example.com
        available:
          type: boolean
          example: true

    EmailVerificationSentData:
      type: object
      required:
        - email
        - expiresInSeconds
      properties:
        email:
          type: string
          format: email
          example: user@example.com
        expiresInSeconds:
          type: integer
          format: int64
          example: 600

    EmailVerificationConfirmData:
      type: object
      required:
        - email
        - verified
      properties:
        email:
          type: string
          format: email
          example: user@example.com
        verified:
          type: boolean
          example: true

    PasswordResetRequestedData:
      type: object
      required:
        - email
        - expiresInSeconds
      properties:
        email:
          type: string
          format: email
          example: user@example.com
        expiresInSeconds:
          type: integer
          format: int64
          example: 600

    KakaoAccountLinkRequiredData:
      type: object
      required:
        - email
        - provider
        - linkToken
        - expiresInSeconds
      properties:
        email:
          type: string
          format: email
          example: user@example.com
        provider:
          $ref: '#/components/schemas/AuthProvider'
        linkToken:
          type: string
          example: eyJraWQiOiJrYWthby1saW5rIn0
        expiresInSeconds:
          type: integer
          format: int64
          example: 600

    KakaoNicknameRequiredData:
      type: object
      required:
        - signupToken
        - provider
      properties:
        signupToken:
          type: string
          example: eyJraWQiOiJrYWthby1zaWdudXAifQ
        provider:
          $ref: '#/components/schemas/AuthProvider'
        suggestedNickname:
          type: string
          nullable: true
          example: 카카오사용자

    FieldError:
      type: object
      properties:
        field:
          type: string
          example: email
        reason:
          type: string
          example: 올바른 이메일 형식이 아닙니다.

    ErrorData:
      type: object
      additionalProperties: true
      properties:
        fieldErrors:
          type: array
          items:
            $ref: '#/components/schemas/FieldError'

    UserStatus:
      type: string
      enum:
        - active
        - locked
        - inactive
      example: active

    AuthProvider:
      type: string
      enum:
        - local
        - kakao
        - apple
      example: kakao

    SignupResponse:
      type: object
      required:
        - success
        - code
        - message
        - data
      properties:
        success:
          type: boolean
          example: true
        code:
          type: string
          example: AUTH_SIGNUP_SUCCESS
        message:
          type: string
          example: 회원가입이 완료되었습니다. 이메일 인증을 진행해주세요.
        data:
          $ref: '#/components/schemas/SignupData'

    EmailAvailabilityResponse:
      type: object
      required:
        - success
        - code
        - message
        - data
      properties:
        success:
          type: boolean
          example: true
        code:
          type: string
          example: AUTH_EMAIL_AVAILABLE
        message:
          type: string
          example: 사용 가능한 이메일입니다.
        data:
          $ref: '#/components/schemas/EmailAvailabilityData'

    EmailVerificationSentResponse:
      type: object
      required:
        - success
        - code
        - message
        - data
      properties:
        success:
          type: boolean
          example: true
        code:
          type: string
          example: AUTH_EMAIL_VERIFICATION_SENT
        message:
          type: string
          example: 이메일 인증 메일이 발송되었습니다.
        data:
          $ref: '#/components/schemas/EmailVerificationSentData'

    EmailVerificationConfirmResponse:
      type: object
      required:
        - success
        - code
        - message
        - data
      properties:
        success:
          type: boolean
          example: true
        code:
          type: string
          example: AUTH_EMAIL_VERIFIED
        message:
          type: string
          example: 이메일 인증이 완료되었습니다.
        data:
          $ref: '#/components/schemas/EmailVerificationConfirmData'

    PasswordResetRequestedResponse:
      type: object
      required:
        - success
        - code
        - message
        - data
      properties:
        success:
          type: boolean
          example: true
        code:
          type: string
          example: AUTH_PASSWORD_RESET_REQUESTED
        message:
          type: string
          example: 비밀번호 재설정 안내가 발송되었습니다.
        data:
          $ref: '#/components/schemas/PasswordResetRequestedData'

    AuthTokenResponse:
      type: object
      required:
        - success
        - code
        - message
        - data
      properties:
        success:
          type: boolean
          example: true
        code:
          type: string
          example: AUTH_LOGIN_SUCCESS
        message:
          type: string
          example: 로그인이 완료되었습니다.
        data:
          $ref: '#/components/schemas/AuthTokenData'

    UserResponse:
      type: object
      required:
        - success
        - code
        - message
        - data
      properties:
        success:
          type: boolean
          example: true
        code:
          type: string
          example: AUTH_ME_SUCCESS
        message:
          type: string
          example: 내 정보 조회가 완료되었습니다.
        data:
          $ref: '#/components/schemas/AuthUser'

    KakaoAccountLinkRequiredResponse:
      type: object
      required:
        - success
        - code
        - message
        - data
      properties:
        success:
          type: boolean
          example: false
        code:
          type: string
          example: AUTH_OAUTH_ACCOUNT_LINK_REQUIRED
        message:
          type: string
          example: 동일 이메일로 가입된 계정이 있습니다. 계정 연동이 필요합니다.
        data:
          $ref: '#/components/schemas/KakaoAccountLinkRequiredData'

    KakaoNicknameRequiredResponse:
      type: object
      required:
        - success
        - code
        - message
        - data
      properties:
        success:
          type: boolean
          example: true
        code:
          type: string
          example: AUTH_NICKNAME_REQUIRED
        message:
          type: string
          example: 닉네임 설정이 필요합니다.
        data:
          $ref: '#/components/schemas/KakaoNicknameRequiredData'

    EmptySuccessResponse:
      type: object
      required:
        - success
        - code
        - message
        - data
      properties:
        success:
          type: boolean
          example: true
        code:
          type: string
          example: COMMON_SUCCESS
        message:
          type: string
          example: 요청이 성공했습니다.
        data:
          type: object
          nullable: true
          additionalProperties: true
          example: null

    ErrorResponse:
      type: object
      required:
        - success
        - code
        - message
        - data
      properties:
        success:
          type: boolean
          example: false
        code:
          type: string
          example: COMMON_VALIDATION_ERROR
        message:
          type: string
          example: 요청 값이 올바르지 않습니다.
        data:
          type: object
          nullable: true
          additionalProperties: true
          example: null

    RedisTemporaryTokenPolicy:
      type: object
      description: |
        Redis 기반 임시 토큰/코드 저장 정책입니다.
        실제 API 응답에 직접 포함되는 스키마는 아니며, 서버 내부 구현 정책 문서화 용도입니다.
      properties:
        emailVerificationCode:
          type: string
          description: 이메일 인증 코드 Redis Key
          example: auth:email-verification:code:{email}
        passwordResetCode:
          type: string
          description: 비밀번호 재설정 코드 Redis Key
          example: auth:password-reset:code:{email}
        kakaoSignupToken:
          type: string
          description: Kakao 최초 가입 임시 토큰 Redis Key
          example: auth:kakao:signup:{signupToken}
        kakaoLinkToken:
          type: string
          description: Kakao 계정 연동 임시 토큰 Redis Key
          example: auth:kakao:link:{linkToken}
        ttlSeconds:
          type: integer
          description: 기본 TTL
          example: 600

    HomeResponse:
      allOf:
        - $ref: '#/components/schemas/ApiSuccessBase'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/HomeData'

    HomeData:
      type: object
      required:
        - user
        - hero
        - dDayCards
        - subjects
        - recentActivities
      properties:
        user:
          $ref: '#/components/schemas/HomeUserSummary'
        hero:
          $ref: '#/components/schemas/HomeHero'
        dDayCards:
          type: array
          items:
            $ref: '#/components/schemas/SubjectExamSchedule'
        subjects:
          type: array
          items:
            $ref: '#/components/schemas/SubjectSummary'
        recentActivities:
          type: array
          items:
            $ref: '#/components/schemas/RecentActivity'

    HomeUserSummary:
      type: object
      required:
        - nickname
        - dotoriBalance
        - xpTotal
        - currentLevel
      properties:
        nickname:
          type: string
          example: 도토리장인
        dotoriBalance:
          type: integer
          minimum: 0
          example: 12
        xpTotal:
          type: integer
          minimum: 0
          example: 360
        currentLevel:
          type: integer
          minimum: 1
          maximum: 10
          example: 3
        levelName:
          type: string
          example: 펜굴리는 다람쥐

    HomeHero:
      type: object
      properties:
        hasActiveQuiz:
          type: boolean
          example: true
        activeQuiz:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/RecentActivity'

    RecentActivityListResponse:
      allOf:
        - $ref: '#/components/schemas/ApiSuccessBase'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/RecentActivityPage'

    RecentActivityPage:
      allOf:
        - $ref: '#/components/schemas/PageMeta'
        - type: object
          properties:
            content:
              type: array
              items:
                $ref: '#/components/schemas/RecentActivity'

    RecentActivity:
      type: object
      required:
        - activityId
        - activityType
        - title
        - subjectId
        - subjectName
        - createdAt
      properties:
        activityId:
          type: string
          example: 018f8c2e-8123-72ab-96a1-f7c49c1d1111
        activityType:
          $ref: '#/components/schemas/RecentActivityType'
        quizSessionId:
          type: string
          format: uuid
          nullable: true
          example: 018f8c2e-8123-72ab-96a1-f7c49c1d1111
        playSessionId:
          type: string
          nullable: true
          example: android-play-session-uuid
        resultId:
          type: string
          format: uuid
          nullable: true
          description: 퀴즈 결과 publicId. activityType이 quiz_completed인 경우 사용
          example: 018f8c2e-9999-7b11-b2d1-774f4c1c2222
        title:
          type: string
          example: 데이터베이스 객관식 10문제
        subjectId:
          type: string
          format: uuid
          example: 018f8c2e-5f73-7b6a-b9f0-3f55e7f7c901
        subjectName:
          type: string
          example: 데이터베이스
        status:
          type: string
          nullable: true
          example: completed
        progressPct:
          type: integer
          minimum: 0
          maximum: 100
          nullable: true
          example: 80
        scoreText:
          type: string
          nullable: true
          example: 8/10
        createdAt:
          type: string
          format: date-time
          example: '2026-05-19T07:30:00+09:00'

    RecentActivityType:
      type: string
      enum:
        - quiz_generating
        - quiz_ready
        - quiz_in_progress
        - quiz_completed
        - lecture_uploaded
      example: quiz_completed

    SubjectListResponse:
      allOf:
        - $ref: '#/components/schemas/ApiSuccessBase'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/SubjectPage'

    SubjectPage:
      allOf:
        - $ref: '#/components/schemas/PageMeta'
        - type: object
          properties:
            content:
              type: array
              items:
                $ref: '#/components/schemas/SubjectSummary'

    SubjectResponse:
      allOf:
        - $ref: '#/components/schemas/ApiSuccessBase'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/Subject'

    SubjectDetailResponse:
      allOf:
        - $ref: '#/components/schemas/ApiSuccessBase'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/SubjectDetail'

    SubjectSummary:
      type: object
      required:
        - id
        - name
        - purpose
        - chapterCount
        - partCount
      properties:
        id:
          type: string
          format: uuid
          example: 018f8c2e-5f73-7b6a-b9f0-3f55e7f7c901
        name:
          type: string
          minLength: 1
          maxLength: 30
          example: 데이터베이스
        purpose:
          $ref: '#/components/schemas/SubjectPurpose'
        chapterCount:
          type: integer
          minimum: 0
          example: 3
        partCount:
          type: integer
          minimum: 0
          example: 12
        lastActivityAt:
          type: string
          format: date-time
          nullable: true
          example: '2026-05-19T07:30:00+09:00'
        examSchedule:
