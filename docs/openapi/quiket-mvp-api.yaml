      required:
        - answerValue
      properties:
        answerValue:
          type: string
          example: '1'

    QuizPlayStartRequest:
      type: object
      required:
        - clientSessionId
        - playType
      properties:
        clientSessionId:
          type: string
          maxLength: 128
          example: android-play-session-uuid
        playType:
          $ref: '#/components/schemas/QuizPlayType'
        parentPlaySessionId:
          type: string
          maxLength: 128
          nullable: true
          example: parent-play-session-uuid
        questionShuffled:
          type: boolean
          default: false
          example: false
        optionShuffled:
          type: boolean
          default: true
          example: true
        shuffleSeed:
          type: string
          nullable: true
          example: seed-1234

    QuizPlaySessionResponse:
      allOf:
        - $ref: '#/components/schemas/ApiSuccessBase'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/QuizPlaySession'

    QuizPlaySession:
      type: object
      required:
        - playSessionId
        - clientSessionId
        - quizSessionId
        - playType
        - status
      properties:
        playSessionId:
          type: string
          maxLength: 128
          example: android-play-session-uuid
        clientSessionId:
          type: string
          maxLength: 128
          example: android-play-session-uuid
        quizSessionId:
          type: string
          format: uuid
        playType:
          $ref: '#/components/schemas/QuizPlayType'
        status:
          type: string
          enum:
            - in_progress
            - submitted
            - abandoned
          example: in_progress
        quizSession:
          $ref: '#/components/schemas/QuizSession'

    QuizResultSubmitRequest:
      type: object
      required:
        - clientSessionId
        - quizSessionId
        - playType
        - elapsedMs
        - answers
      properties:
        clientSessionId:
          type: string
          maxLength: 128
          example: android-play-session-uuid
        quizSessionId:
          type: string
          format: uuid
          example: 018f8c2e-8123-72ab-96a1-f7c49c1d1111
        playType:
          $ref: '#/components/schemas/QuizPlayType'
        parentPlaySessionId:
          type: string
          maxLength: 128
          nullable: true
          example: parent-play-session-uuid
        elapsedMs:
          type: integer
          minimum: 0
          example: 430000
        questionShuffled:
          type: boolean
          example: false
        optionShuffled:
          type: boolean
          example: true
        shuffleSeed:
          type: string
          nullable: true
          example: seed-1234
        answers:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/QuizAnswerSubmitItem'

    QuizAnswerSubmitItem:
      type: object
      required:
        - questionId
        - skipped
      properties:
        questionId:
          type: string
          format: uuid
          example: 018f8c2e-9001-7bc4-8211-777777777001
        selectedOptionId:
          type: string
          nullable: true
          example: '2'
        selectedValue:
          type: string
          nullable: true
          example: O
        correctClient:
          type: boolean
          nullable: true
          example: true
        skipped:
          type: boolean
          example: false
        answerElapsedMs:
          type: integer
          nullable: true
          minimum: 0
          example: 15000
        marked:
          type: boolean
          default: false
          example: false

    QuizResultResponse:
      allOf:
        - $ref: '#/components/schemas/ApiSuccessBase'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/QuizResult'

    QuizResult:
      type: object
      required:
        - resultId
        - playSessionId
        - quizSessionId
        - subjectId
        - totalCount
        - correctCount
        - wrongCount
        - skipCount
        - accuracyPct
        - elapsedMs
        - rewards
        - reviewItems
      properties:
        resultId:
          type: string
          format: uuid
          description: 퀴즈 결과 publicId
          example: 018f8c2e-9999-7b11-b2d1-774f4c1c2222
        playSessionId:
          type: string
          maxLength: 128
          example: android-play-session-uuid
        quizSessionId:
          type: string
          format: uuid
        subjectId:
          type: string
          format: uuid
        subjectName:
          type: string
          example: 데이터베이스
        totalCount:
          type: integer
          example: 10
        correctCount:
          type: integer
          example: 8
        wrongCount:
          type: integer
          example: 2
        skipCount:
          type: integer
          example: 0
        accuracyPct:
          type: integer
          minimum: 0
          maximum: 100
          example: 80
        elapsedMs:
          type: integer
          example: 430000
        scoreMatched:
          type: boolean
          example: true
        abuseFlagged:
          type: boolean
          example: false
        rewards:
          $ref: '#/components/schemas/RewardSummary'
        reviewItems:
          type: array
          items:
            $ref: '#/components/schemas/QuizReviewItem'
        retryAvailable:
          $ref: '#/components/schemas/RetryAvailable'
        createdAt:
          type: string
          format: date-time
          example: '2026-05-19T07:30:00+09:00'

    QuizReviewResponse:
      allOf:
        - $ref: '#/components/schemas/ApiSuccessBase'
        - type: object
          properties:
            data:
              type: object
              required:
                - playSessionId
                - items
              properties:
                playSessionId:
                  type: string
                  maxLength: 128
                  example: android-play-session-uuid
                items:
                  type: array
                  items:
                    $ref: '#/components/schemas/QuizReviewItem'

    QuizReviewItem:
      type: object
      required:
        - questionId
        - displayOrder
        - body
        - correctServer
      properties:
        questionId:
          type: string
          format: uuid
        displayOrder:
          type: integer
          example: 1
        summary:
          type: string
          nullable: true
          example: 모델링의 특징
        body:
          type: string
          example: 다음 중 데이터 모델링의 특징으로 올바른 것은?
        options:
          type: array
          items:
            $ref: '#/components/schemas/QuestionOption'
        selectedOptionId:
          type: string
          nullable: true
          example: '2'
        selectedValue:
          type: string
          nullable: true
          example: O
        answerValue:
          type: string
          example: '1'
        correctServer:
          type: boolean
          example: false
        skipped:
          type: boolean
          example: false
        correctExplanation:
          type: string
          nullable: true
          example: 데이터 모델링은 복잡한 현실 데이터를 추상화합니다.
        incorrectExplanation:
          type: string
          nullable: true
          example: 선택한 답은 데이터 모델링의 핵심 특징과 맞지 않습니다.
        sourcePart:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/PartSummary'

    QuizRetryRequest:
      type: object
      required:
        - clientSessionId
      properties:
        clientSessionId:
          type: string
          maxLength: 128
          example: android-retry-session-uuid
        questionShuffled:
          type: boolean
          example: false
        optionShuffled:
          type: boolean
          example: true
        shuffleSeed:
          type: string
          nullable: true
          example: seed-5678

    RewardSummary:
      type: object
      required:
        - dotoriEarned
        - xpEarned
        - leveledUp
      properties:
        dotoriEarned:
          type: integer
          minimum: 0
          example: 8
        xpEarned:
          type: integer
          minimum: 0
          example: 32
        leveledUp:
          type: boolean
          example: true
        newLevel:
          type: integer
          nullable: true
          minimum: 1
          maximum: 10
          example: 3
        currentDotoriBalance:
          type: integer
          minimum: 0
          example: 20
        currentXpTotal:
          type: integer
          minimum: 0
          example: 360

    RetryAvailable:
      type: object
      properties:
        retryAll:
          type: boolean
          example: true
        retryWrong:
          type: boolean
          example: true
        wrongCount:
          type: integer
          example: 2

    GamificationResponse:
      allOf:
        - $ref: '#/components/schemas/ApiSuccessBase'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/GamificationData'

    GamificationData:
      type: object
      required:
        - dotoriBalance
        - xpTotal
        - currentLevel
        - maxLevel
      properties:
        dotoriBalance:
          type: integer
          minimum: 0
          example: 20
        xpTotal:
          type: integer
          minimum: 0
          example: 360
        currentLevel:
          type: integer
          minimum: 1
          maximum: 10
          example: 3
        currentLevelName:
          type: string
          example: 펜굴리는 다람쥐
        maxLevel:
          type: integer
          example: 10
        nextLevel:
          type: integer
          nullable: true
          example: 4
        nextLevelName:
          type: string
          nullable: true
          example: 노력형 다람쥐
        currentLevelMinXp:
          type: integer
          example: 350
        nextLevelRequiredXp:
          type: integer
          nullable: true
          example: 850
        levelProgressPct:
          type: integer
          minimum: 0
          maximum: 100
          example: 25

    MyProfileResponse:
      allOf:
        - $ref: '#/components/schemas/ApiSuccessBase'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/MyProfile'

    MyProfile:
      allOf:
        - $ref: '#/components/schemas/AuthUser'
        - type: object
          properties:
            xpTotal:
              type: integer
              example: 360
            currentLevel:
              type: integer
              example: 3
            createdAt:
              type: string
              format: date-time
              example: '2026-05-19T07:30:00+09:00'

    NicknameUpdateRequest:
      type: object
      required:
        - nickname
      properties:
        nickname:
          type: string
          minLength: 2
          maxLength: 12
          pattern: '^[가-힣A-Za-z]{2,12}$'
          description: 닉네임 2~12자, 한글 또는 영문 (기능명세 MY-001 - 자체 회원가입 정책과 일치)
          example: 도토리장인

    MyEmailChangeRequest:
      type: object
      required:
        - newEmail
      properties:
        newEmail:
          type: string
          format: email
          maxLength: 255
          description: 변경할 새 이메일. 형식 검증 및 중복 검사 후 인증 메일을 발송합니다.
          example: new.user@example.com

    MyEmailChangeConfirmRequest:
      type: object
      required:
        - newEmail
        - verificationCode
      properties:
        newEmail:
          type: string
          format: email
          maxLength: 255
          example: new.user@example.com
        verificationCode:
          type: string
          minLength: 6
          maxLength: 6
          pattern: '^\d{6}$'
          description: 새 이메일로 발송된 6자리 숫자 인증 코드
          example: '123456'

    PasswordChangeRequest:
      type: object
      required:
        - currentPassword
        - newPassword
        - newPasswordConfirm
      properties:
        currentPassword:
          type: string
          example: Password123!
        newPassword:
          type: string
          minLength: 8
          maxLength: 32
          pattern: '^(?=.*[A-Za-z])(?=.*\d)[A-Za-z0-9~!@#$%^&*()_+=\[\]{}.,?-]{8,32}$'
          example: NewPassword123!
        newPasswordConfirm:
          type: string
          minLength: 8
          maxLength: 32
          example: NewPassword123!

    AccountDeleteRequest:
      type: object
      required:
        - agreedToDelete
      properties:
        password:
          type: string
          nullable: true
          description: Local 계정인 경우 확인용 비밀번호
          example: Password123!
        agreedToDelete:
          type: boolean
          example: true

    NotificationSettingsResponse:
      allOf:
        - $ref: '#/components/schemas/ApiSuccessBase'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/NotificationSettings'

    NotificationSettings:
      type: object
      required:
        - activityEnabled
        - updateEnabled
        - reviewEnabled
      properties:
        fcmTokenRegistered:
          type: boolean
          example: true
        activityEnabled:
          type: boolean
          example: true
        updateEnabled:
          type: boolean
          example: true
        reviewEnabled:
          type: boolean
          example: true

    NotificationSettingsUpdateRequest:
      type: object
      required:
        - activityEnabled
        - updateEnabled
        - reviewEnabled
      properties:
        activityEnabled:
          type: boolean
          example: true
        updateEnabled:
          type: boolean
          example: true
        reviewEnabled:
          type: boolean
          example: true

    FcmTokenUpdateRequest:
      type: object
      required:
        - fcmToken
      properties:
        fcmToken:
          type: string
          maxLength: 255
          example: fcm-token-from-android

    FeedbackCreateRequest:
      type: object
      required:
        - category
        - body
      properties:
        category:
          type: string
          enum:
            - feature
            - bug
            - inquiry
            - other
          example: feature
        body:
          type: string
          minLength: 1
          maxLength: 1000
          example: 퀴즈 결과 화면에서 복습 알림을 받을 수 있으면 좋겠어요.
        replyEmail:
          type: string
          format: email
          nullable: true
          example: user@example.com
        appVersion:
          type: string
          nullable: true
          example: 1.0.0
        osVersion:
          type: string
          nullable: true
          example: Android 15
        deviceModel:
          type: string
          nullable: true
          example: Galaxy S24

    FeedbackResponse:
      allOf:
        - $ref: '#/components/schemas/ApiSuccessBase'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/Feedback'

    Feedback:
      allOf:
        - $ref: '#/components/schemas/FeedbackCreateRequest'
        - type: object
          required:
            - id
            - createdAt
          properties:
            id:
              type: string
              example: '1'
            createdAt:
              type: string
              format: date-time
              example: '2026-05-19T07:30:00+09:00'

    QuizType:
      type: string
      enum:
        - multiple_choice
        - ox
      example: multiple_choice

    QuizPlayMode:
      type: string
      enum:
        - one_by_one
        - all_at_once
      example: one_by_one

    QuizDifficulty:
      type: string
      enum:
        - easy
        - medium
        - hard
      example: medium

    QuizGenerationStatus:
      type: string
      enum:
        - pending
        - in_progress
        - completed
        - failed
      example: completed

    QuizPlayType:
      type: string
      enum:
        - first
        - retry_all
        - retry_wrong
      example: first

    ApiSuccessBase:
      type: object
      required:
        - success
        - code
        - message
        - data
      properties:
        success:
          type: boolean
          example: true
        code:
          type: string
          example: COMMON_SUCCESS
        message:
          type: string
          example: 요청이 성공했습니다.
        data:
          nullable: true

    PageMeta:
      type: object
      required:
        - content
        - page
        - size
        - totalElements
        - totalPages
        - hasNext
      properties:
        page:
          type: integer
          example: 0
        size:
          type: integer
          example: 10
        totalElements:
          type: integer
          format: int64
          example: 42
        totalPages:
          type: integer
          example: 5
        hasNext:
          type: boolean
          example: true
