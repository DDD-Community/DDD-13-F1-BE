      summary: Kakao 최초 로그인 닉네임 설정
      description: Kakao 최초 로그인 시 닉네임 설정이 필요한 경우 닉네임을 저장하고 Quiket 토큰을 발급합니다. signupToken은 Redis에 저장된 Kakao 가입 임시 토큰을 검증합니다.
      operationId: completeKakaoNickname
      parameters:
        - $ref: '#/components/parameters/XDeviceId'
        - $ref: '#/components/parameters/XDeviceName'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/KakaoNicknameRequest'
      responses:
        '200':
          description: 닉네임 설정 및 로그인 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokenResponse'
              examples:
                default:
                  value:
                    success: true
                    code: AUTH_OAUTH_NICKNAME_COMPLETED
                    message: 닉네임 설정 및 로그인이 완료되었습니다.
                    data:
                      accessToken: eyJhbGciOiJIUzI1NiJ9.access.payload
                      refreshToken: eyJhbGciOiJIUzI1NiJ9.refresh.payload
                      tokenType: Bearer
                      accessTokenExpiresIn: 1800
                      refreshTokenExpiresIn: 2592000
                      user:
                        id: 018f8c2e-5f73-7b6a-b9f0-3f55e7f7c901
                        email: kakao.user@example.com
                        nickname: 도토리장인
                        dotoriBalance: 0
                        emailVerified: true
                        status: active
                        providers:
                          - kakao
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          description: signupToken 무효
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

