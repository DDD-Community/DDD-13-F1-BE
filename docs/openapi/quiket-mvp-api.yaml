    patch:
      tags:
        - My Page
      summary: 비밀번호 변경
      description: 소셜 전용 계정은 비밀번호 변경을 지원하지 않습니다.
      operationId: updateMyPassword
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
