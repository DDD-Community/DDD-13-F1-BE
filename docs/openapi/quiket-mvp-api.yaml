          application/json:
            schema:
              $ref: '#/components/schemas/FcmTokenUpdateRequest'
      responses:
        '200':
          description: FCM 토큰 갱신 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmptySuccessResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /feedbacks:
